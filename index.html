<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --text: #e8e4dc;
    --muted: #6b6f7a;
    --gold: #c9a84c;
    --gold-dim: #7a6228;
    --red: #d05252;
    --green: #5a9e6f;
    --green-bright: #7fd49a;
    --green-dim: #1e3b28;
    --red-dim: #3b1a1a;
    --orange: #d08c4a;
    --orange-dim: #3b2610;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 4rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 15%, rgba(201,168,76,0.045) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 85%, rgba(90,158,111,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-top: 1.5rem; 
    position: relative;
  }

  /* Título sin cursiva y con espaciado ajustado */
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 7vw, 3.8rem);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  header p {
    margin-top: 0.5rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .global-reset-btn {
    position: absolute;
    top: -1rem; 
    right: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.35rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .global-reset-btn:hover, .global-reset-btn:focus-visible {
    color: var(--text);
    border-color: var(--muted);
    background: var(--surface2);
  }
  
  *:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-bottom: 1.5rem;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.7s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .stats-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    margin-top: 2.5rem; /* Ajustado para estar en la parte inferior */
    margin-bottom: 0;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    align-items: center;
    justify-content: center; /* Centrado para que quede simétrico abajo */
  }

  .stat { display: flex; align-items: center; gap: 0.3rem; }
  .stat-val { color: var(--text); font-weight: 500; }
  .stat-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }

  /* Previous verb strip */
  .prev-strip { margin-bottom: 1rem; min-height: 50px; }

  .prev-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .prev-card.visible { opacity: 1; transform: translateY(0); }

  .prev-label {
    color: var(--muted);
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .prev-verbs {
    display: flex;
    gap: 1.2rem;
    flex: 1;
    flex-wrap: wrap;
  }

  .prev-item { display: flex; flex-direction: column; gap: 0.1rem; }
  .prev-item-label { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  
  .prev-item-val { 
    font-family: 'Inter', sans-serif; 
    font-weight: 500; 
    font-size: 0.85rem; 
    color: var(--text); 
  }

  .prev-badge {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.4rem;
    border-radius: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .prev-badge.ok   { background: var(--green-dim); color: var(--green-bright); }
  .prev-badge.fail { background: var(--red-dim); color: var(--red); }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem 2rem 1.75rem;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  .verb-meta {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    min-height: 20px; /* Previene saltos de altura */
  }

  .verb-label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

  /* Level Badge - Ahora con posición absoluta para no desplazar nada */
  .level-badge {
    position: absolute;
    top: 2rem;
    right: 2rem;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .level-badge.l1 { background: var(--red-dim); color: var(--red); opacity: 1; }
  .level-badge.l2 { background: var(--orange-dim); color: var(--orange); opacity: 1; }
  .level-badge.l3 { background: #1e2e1e; color: #6db37a; opacity: 1; }

  /* Wrapper para mantener una altura fija y no desplazar nada */
  .verb-display-wrapper {
    display: flex;
    align-items: center;
    margin-bottom: 0.3rem;
    min-height: 4rem; /* Altura fija para evitar brincos si el texto cambia */
  }

  .verb-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 7vw, 3.6rem);
    font-style: italic;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0; 
    padding-right: 4rem; /* Espacio reservado para el círculo del streak */
    word-break: break-word;
  }

  /* Contador de racha circular - Posición Absoluta */
  .streak-badge {
    position: absolute;
    right: 2rem;
    top: 3.8rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 2.8rem;
    height: 2.8rem;
    padding: 0 0.5rem;
    border-radius: 50px;
    border: 1.5px solid var(--orange);
    color: var(--orange);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    opacity: 0; 
    transform: scale(0.8);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .streak-badge.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* Animación: Pop (al subir racha) */
  @keyframes badgePop {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); background: var(--orange-dim); border-color: var(--gold); color: var(--gold); }
    100% { transform: scale(1); background: transparent; }
  }

  /* Animación: Micro-celebración para estadísticas */
  @keyframes statPop {
    0% { transform: scale(1); color: var(--text); }
    50% { transform: scale(1.3); color: var(--gold); }
    100% { transform: scale(1); color: var(--text); }
  }
  .anim-stat-pop {
    animation: statPop 0.5s ease;
    display: inline-block;
  }

  /* Animación: Rotura (al perder racha) */
  @keyframes badgeShatter {
    0% { transform: translateX(0) scale(1); border-color: var(--red); color: var(--red); background: var(--red-dim); }
    20% { transform: translateX(-5px) scale(0.95); border-color: var(--red); color: var(--red); background: var(--red-dim); }
    40% { transform: translateX(5px) scale(0.95); border-color: var(--red); color: var(--red); background: var(--red-dim); }
    60% { transform: translateX(-5px) scale(0.95); border-color: var(--red); color: var(--red); background: var(--red-dim); }
    80% { transform: translateX(5px) scale(0.95); border-color: var(--red); color: var(--red); background: var(--red-dim); }
    100% { transform: translateX(0) scale(1); border-color: var(--red); color: var(--red); background: transparent; }
  }

  .streak-badge.anim-pop { animation: badgePop 0.4s ease-out; }
  .streak-badge.anim-shatter { animation: badgeShatter 0.4s ease-in-out forwards; }

  .verb-hint {
    font-size: 0.68rem;
    color: var(--muted);
    min-height: 1.1em;
    margin-bottom: 1.75rem;
    letter-spacing: 0.05em;
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .field-group { display: flex; flex-direction: column; gap: 0.4rem; }

  .field-group label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field-group input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 0.6rem 0.75rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
  }

  .field-group input:focus { border-color: var(--gold-dim); background: #1a1c21; }
  .field-group input.correct { border-color: var(--green); background: var(--green-dim); color: var(--green-bright); }
  .field-group input.wrong { border-color: var(--red); background: var(--red-dim); color: #e07878; animation: shake 0.35s ease; }
  .field-group input.must-type { border-color: var(--red); background: var(--red-dim); color: var(--text); }

  .correct-hint {
    font-size: 1.4rem;
    min-height: 2rem;
    color: var(--red);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.25rem;
    opacity: 0;
    transform: translateY(-5px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .correct-hint.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @keyframes slideFadeIn {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .anim-slide-fade {
    animation: slideFadeIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  .feedback-row {
    min-height: 1.2rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    line-height: 1.4;
  }
  .feedback-row.wrong   { color: var(--red); }
  .feedback-row.correct { color: var(--green-bright); }
  .feedback-row.retry   { color: var(--red); }

  .btn-row { 
    display: flex; 
    gap: 0.75rem; 
    align-items: center; 
    justify-content: flex-end; 
  }

  button.check-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.65rem 1.6rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  button.check-btn:hover:not(:disabled) { background: #d4b05a; }
  button.check-btn:active:not(:disabled) { transform: scale(0.97); }
  button.check-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .queue-preview {
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }

  .queue-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.65rem;
  }

  .queue-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }

  .chip {
    font-size: 0.8rem;
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--text);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .chip.l1 { border-color: #5a2020; color: #c06060; }
  .chip.l2 { border-color: #5a3a10; color: #c08840; }
  .chip.l3 { border-color: #1e3a20; color: #60a870; }

  /* Completed */
  .completed-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem 2rem;
    text-align: center;
    display: none;
    position: relative;
  }
  .completed-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .completed-card h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); margin-bottom: 0.5rem; }
  .completed-card p { color: var(--muted); font-size: 0.75rem; line-height: 1.7; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  .score-big { font-size: 2.5rem; font-family: 'Playfair Display', serif; color: var(--text); display: block; margin: 1rem 0 0.25rem; }
  .score-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin-bottom: 1.75rem; display: block; }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
    border-radius: 3px;
    transition: border-color 0.2s, color 0.2s;
  }
  .restart-btn:hover, .restart-btn:focus-visible { border-color: var(--gold-dim); color: var(--gold); }

  @media (max-width: 450px) {
    .fields { grid-template-columns: 1fr; gap: 1.5rem; }
    .card { padding: 1.5rem 1.25rem; }
    header { padding-top: 1.5rem; }
    .global-reset-btn { top: -1.5rem; right: 0; }
    /* Ajuste de posición de badges en móvil debido al padding menor de la card */
    .level-badge { right: 1.25rem; top: 1.5rem; }
    .streak-badge { right: 1.25rem; top: 3.3rem; }
  }
</style>
</head>
<body>

<main class="container">
  <header>
    <button id="globalResetBtn" class="global-reset-btn" title="Reset all progress">↺ Restart</button>
    <h1>Irregular Verbs</h1>
    <p>Spaced Repetition Practice</p>
  </header>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>

  <div class="prev-strip">
    <div class="prev-card" id="prevCard">
      <span class="prev-label">prev</span>
      <div class="prev-verbs" id="prevVerbs"></div>
      <span class="prev-badge" id="prevBadge"></span>
    </div>
  </div>

  <div class="card" id="practiceCard">
    <div class="verb-meta">
      <div class="verb-label">Infinitive</div>
      <span class="level-badge" id="levelBadge"></span>
    </div>
    
    <!-- Wrapper para mantener la altura constante -->
    <div class="verb-display-wrapper">
      <div class="verb-display" id="verbDisplay">—</div>
      <div class="streak-badge" id="streakBadge">x0</div>
    </div>
    
    <div class="verb-hint" id="verbHint">&nbsp;</div>

    <div class="fields">
      <div class="field-group">
        <label for="pastInput">Simple Past</label>
        <input type="text" id="pastInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="past…">
        <div class="correct-hint" id="pastHint"></div>
      </div>
      <div class="field-group">
        <label for="ppInput">Past Participle</label>
        <input type="text" id="ppInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="participle…">
        <div class="correct-hint" id="ppHint"></div>
      </div>
    </div>

    <div class="feedback-row" id="feedbackRow">&nbsp;</div>

    <div class="btn-row">
      <button class="check-btn" id="checkBtn">Check</button>
    </div>

    <div class="queue-preview" id="queuePreview">
      <div class="queue-label">Coming up</div>
      <div class="queue-chips" id="queueChips"></div>
    </div>
  </div>

  <div class="completed-card" id="completedCard">
    <h2>Round complete.</h2>
    <span class="score-big" id="completedScore">0</span>
    <span class="score-label">max streak achieved</span>
    <p>You have successfully mastered all the verbs!<br>Starting a new round will reset your progress to zero.</p>
    <button class="restart-btn" id="restartBtn">Start next round →</button>
  </div>

  <!-- Estadísticas movidas a la parte inferior -->
  <div class="stats-row">
    <span class="stat"><span class="stat-val" id="statDone">0</span>&nbsp;mastered</span>
    <span class="stat-dot"></span>
    <span class="stat"><span class="stat-val" id="statQueue">0</span>&nbsp;in queue</span>
    <span class="stat-dot"></span>
    <span class="stat"><span class="stat-val" id="statReview">0</span>&nbsp;reviewing</span>
    <span class="stat-dot"></span>
    <!-- Récord Máximo de Racha -->
    <span class="stat" style="color: var(--gold)"><span class="stat-val" id="statMaxStreak">0</span>&nbsp;best 🏆</span>
  </div>
</main>

<script>
/* ═══════════════════════════════════════════════════
   VERB DATA & TIPS ENGINE
═══════════════════════════════════════════════════ */
const VERBS = [
  {inf:"awake",past:"awoke",pp:"awoken"},{inf:"bear",past:"bore",pp:"born"},

function getTip(v) {
  const inf = v.inf;
  if (['bring','buy','catch','fight','seek','teach','think'].includes(inf)) return "💡 Tip: -ought / -aught pattern (e.g., think → thought)";
  if (['begin','drink','ring','sing','sink','spring','stink','swim'].includes(inf)) return "💡 Tip: i → a → u vowel shift (e.g., sing → sang → sung)";
  if (['blow','draw','fly','grow','know','throw'].includes(inf)) return "💡 Tip: -ew in past, -own in participle (e.g., throw → threw)";
  if (['drive','ride','rise','write'].includes(inf)) return "💡 Tip: -o- in past, -en in participle (e.g., ride → rode → ridden)";
  if (['awake','bear','break','choose','freeze','speak','steal','wake','tear','wear'].includes(inf)) return "💡 Tip: -o- in past, -en or -n in participle (e.g., speak → spoke)";
  if (['bite','hide'].includes(inf)) return "💡 Tip: Short vowel in past, double consonant + en (e.g., hide → hid → hidden)";
  if (['sell','tell'].includes(inf)) return "💡 Tip: -ell becomes -old (e.g., tell → told)";
  if (['deal','feel','keep','kneel','leave','sleep','sweep','weep'].includes(inf)) return "💡 Tip: Short 'e' sound + t (e.g., sleep → slept, deal → dealt)";
  if (['bend','build','lend','send','spend'].includes(inf)) return "💡 Tip: Final -d becomes -t (e.g., send → sent)";
  if (['broadcast','burst','cast','cost','cut','hit','hurt','let','put','quit','read','set','shut','split','spread'].includes(inf)) return "💡 Tip: No change! All three forms are exactly the same.";
  if (['lay','pay','say'].includes(inf)) return "💡 Tip: -ay becomes -aid (e.g., pay → paid)";
  if (inf === 'beat') return "💡 Tip: Past is 'beat', participle adds -en: beaten";
  if (['come','become','overcome'].includes(inf)) return "💡 Tip: Participle is the same as the infinitive.";
  if (inf === 'run') return "💡 Tip: Participle is the same as the infinitive (run → ran → run).";
  if (['bind','find','wind'].includes(inf)) return "💡 Tip: -ind becomes -ound (e.g., find → found)";
  if (['dig','hang','spin','stick','sting','strike','swing'].includes(inf)) return "💡 Tip: Vowel changes to 'u' for both past & participle (or 'uck'/'ung').";
  if (['bleed','feed','meet'].includes(inf)) return "💡 Tip: Double 'ee' reduces to single 'e' (e.g., feed → fed)";
  if (inf === 'show') return "💡 Tip: Regular past (-ed), but irregular participle (-n): showed → shown";
  if (inf === 'withdraw') return "💡 Tip: Just like 'draw' (withdrew → withdrawn)";
  return "💡 Tip: Pay special attention to this irregular form!";
}

/* ═══════════════════════════════════════════════════
   SPACED REPETITION CONFIGURATION
═══════════════════════════════════════════════════ */
const LEVEL_CONFIG = {
  1: { intervalMin: 3,  intervalMax: 5,  streakNeeded: 1 },
  2: { intervalMin: 6,  intervalMax: 9,  streakNeeded: 1 },
  3: { intervalMin: 10, intervalMax: 15, streakNeeded: 1 },
};

function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function normalize(s) { return s.trim().toLowerCase().replace(/[^a-z]/g, ''); }

/* ── State & LocalStorage ── */
let S;

function saveState() {
  try { localStorage.setItem('irregularVerbsMeta', JSON.stringify(S.meta)); } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('irregularVerbsMeta');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function initState() {
  S = {
    meta: loadState() || {},         
    queue: [],        
    mastered: new Set(),
    reviewing: new Set(),
    currentStreak: 0,
    maxStreak: 0,
    failedThisShow: false,
    revealMode: false,
    prevEntry: null,
  };

  VERBS.forEach(v => { 
    if (!S.meta[v.inf]) S.meta[v.inf] = { level: 0, streak: 0, totalErrors: 0 }; 
  });

  buildQueue();
}

/* ── Animación del Badge de Racha ── */
function animateStreak(type) {
  const badge = $('streakBadge');
  
  if (type === 'pop') {
    badge.textContent = 'x' + S.currentStreak;
    badge.classList.add('visible');
    badge.classList.remove('anim-pop', 'anim-shatter');
    void badge.offsetWidth; // Forzar reflow para reiniciar la animación
    badge.classList.add('anim-pop');
  } else if (type === 'shatter') {
    // Mantener número antiguo mientras hace el efecto de romperse
    badge.classList.remove('anim-pop', 'anim-shatter');
    void badge.offsetWidth; 
    badge.classList.add('anim-shatter');
    
    // Ocultar tras la animación
    setTimeout(() => {
      badge.textContent = 'x0';
      badge.classList.remove('visible');
    }, 400);
  } else {
    // Reset silencioso
    badge.textContent = 'x' + S.currentStreak;
    if (S.currentStreak === 0) badge.classList.remove('visible');
  }
}

/* ── Queue Management ── */
function buildQueue() {
  S.mastered.clear();
  S.reviewing.clear();

  let unmastered = [];
  
  VERBS.forEach(v => {
    if (S.meta[v.inf].level >= 4) {
      S.mastered.add(v.inf);
    } else {
      unmastered.push(v);
    }
  });

  if (unmastered.length === 0) {
    VERBS.forEach(v => { S.meta[v.inf] = { level: 0, streak: 0, totalErrors: 0 }; });
    S.mastered.clear();
    unmastered = [...VERBS];
    saveState();
  }

  const weighted = unmastered.map(v => ({ 
    v, 
    key: Math.random() - (S.meta[v.inf].totalErrors * 0.12) - (S.meta[v.inf].level * 0.5) 
  }));
  weighted.sort((a,b) => a.key - b.key);
  
  S.queue = weighted.map(w => w.v);

  S.queue.forEach(v => {
    if (S.meta[v.inf].level > 0) S.reviewing.add(v.inf);
  });
}

function spliceIn(verb, level) {
  const cfg = LEVEL_CONFIG[level];
  const pos = Math.min(rand(cfg.intervalMin, cfg.intervalMax), S.queue.length);
  S.queue.splice(pos, 0, verb);
  S.reviewing.add(verb.inf);
}

function removeAllFuture(inf) {
  for (let i = S.queue.length - 1; i > 0; i--) { 
    if (S.queue[i].inf === inf) S.queue.splice(i, 1);
  }
}

/* ── Handlers ── */
function onCorrect() {
  const v = S.queue[0];
  const m = S.meta[v.inf];
  const firstTry = !S.failedThisShow;
  S.prevEntry = { verb: v, firstTry };

  if (firstTry) {
    S.currentStreak++;
    if (S.currentStreak > S.maxStreak) S.maxStreak = S.currentStreak;
    animateStreak('pop');
  }

  if (firstTry) {
    if (m.level === 0) {
      m.level = 4;
      S.mastered.add(v.inf);
      S.reviewing.delete(v.inf);
      saveState();
    } else {
      m.streak++;
      const cfg = LEVEL_CONFIG[m.level];
      if (m.streak >= cfg.streakNeeded) {
        const next = m.level + 1;
        if (next >= 4) {
          m.level = 4;
          S.mastered.add(v.inf);
          S.reviewing.delete(v.inf);
          saveState();
          
          // Celebración visual en la estadística
          const sD = $('statDone');
          sD.classList.remove('anim-stat-pop');
          void sD.offsetWidth;
          sD.classList.add('anim-stat-pop');
        } else {
          m.level = next;
          m.streak = 0;
          saveState();
          spliceIn(v, m.level);
        }
      } else {
        spliceIn(v, m.level);
      }
    }
  }

  doAdvance();
}

function onWrong() {
  const v = S.queue[0];
  const m = S.meta[v.inf];
  m.totalErrors++;
  m.streak = 0;
  S.failedThisShow = true;
  
  if (S.currentStreak > 0) {
    animateStreak('shatter');
  }
  S.currentStreak = 0;
  
  removeAllFuture(v.inf);
  m.level = 1;
  saveState();
  spliceIn(v, 1);
  updateStats();
}

function doAdvance() {
  S.queue.shift();
  updateStats();
  showPrev();
  if (S.queue.length === 0) { showCompleted(); return; }
  loadVerb(S.queue[0]);
}

/* ── Load Verb ── */
function loadVerb(v) {
  S.failedThisShow = false;
  S.revealMode = false;

  const pi = $('pastInput'), ppi = $('ppInput');
  pi.value = ''; ppi.value = '';
  pi.className = ''; ppi.className = '';
  pi.readOnly = false; ppi.readOnly = false;
  
  $('pastHint').textContent = '';
  $('pastHint').classList.remove('visible');
  $('ppHint').textContent = '';
  $('ppHint').classList.remove('visible');

  $('feedbackRow').className = 'feedback-row';
  $('feedbackRow').innerHTML = '&nbsp;';
  $('checkBtn').textContent = 'Check';
  $('checkBtn').disabled = false;

  $('verbDisplay').textContent = v.inf;
  $('verbHint').textContent = v.hint || '\u00a0';

  const m = S.meta[v.inf];
  const badge = $('levelBadge');
  badge.className = 'level-badge';
  if (m.level === 1) { badge.className = 'level-badge l1'; badge.textContent = '↺ Level 1'; }
  else if (m.level === 2) { badge.className = 'level-badge l2'; badge.textContent = '↺ Level 2'; }
  else if (m.level === 3) { badge.className = 'level-badge l3'; badge.textContent = '↺ Level 3'; }

  // Restaura animacion suave
  $('verbDisplay').classList.remove('anim-slide-fade');
  void $('verbDisplay').offsetWidth;
  $('verbDisplay').classList.add('anim-slide-fade');

  // Deshabilita el boton si estamos en modo limpio y no hay texto
  validateEmptyInputs();

  renderQueue();
  pi.focus();
}

/* ── Check Empty Inputs ── */
function validateEmptyInputs() {
  if (S.revealMode) return; // Si estamos en reveal, las validaciones son distintas
  const pi = $('pastInput').value.trim();
  const ppi = $('ppInput').value.trim();
  $('checkBtn').disabled = (pi === '' && ppi === '');
}

$('pastInput').addEventListener('input', () => {
  validateEmptyInputs();
  checkRealtimeCorrection('pastInput', S.queue[0]?.past, 'pastHint');
});

$('ppInput').addEventListener('input', () => {
  validateEmptyInputs();
  checkRealtimeCorrection('ppInput', S.queue[0]?.pp, 'ppHint');
});

function checkRealtimeCorrection(inputId, correctVal, hintId) {
  if (!S.revealMode) return;
  const el = $(inputId);
  if (el.readOnly) return; // Ya estaba bien corregido
  if (normalize(el.value) === normalize(correctVal)) {
    el.className = 'correct';
    $(hintId).classList.remove('visible');
    
    // Si ambos estan ya bien durante el tipo, activamos el boton para seguir rapido
    const pOk = normalize($('pastInput').value) === normalize(S.queue[0].past);
    const ppOk = normalize($('ppInput').value) === normalize(S.queue[0].pp);
    if (pOk && ppOk) {
      $('checkBtn').disabled = false;
      check(); // auto-continua
    } else {
      // Auto move focus to the other field
      if (inputId === 'pastInput' && !$('ppInput').readOnly) {
        $('ppInput').focus();
      } else if (inputId === 'ppInput' && !$('pastInput').readOnly) {
        $('pastInput').focus();
      }
    }
  } else {
    // Si lo borra de nuevo despues de tenerlo bien, vuelve rojo
    if (el.className === 'correct') {
      el.className = 'must-type';
      $(hintId).classList.add('visible');
    }
  }
}

/* ── Check ── */
function check() {
  const v = S.queue[0];
  const pi = $('pastInput'), ppi = $('ppInput');
  const fb = $('feedbackRow');

  if (S.revealMode) {
    const pOk = normalize(pi.value) === normalize(v.past);
    const ppOk = normalize(ppi.value) === normalize(v.pp);
    
    if (pOk && ppOk) {
      pi.className = 'correct'; pi.readOnly = true;
      ppi.className = 'correct'; ppi.readOnly = true;
      $('pastHint').classList.remove('visible');
      $('ppHint').classList.remove('visible');
      
      fb.className = 'feedback-row correct';
      fb.textContent = '✓ Got it — continuing.';
      $('checkBtn').disabled = true;
      setTimeout(() => onCorrect(), 600);
    } else {
      if (pOk) {
        pi.className = 'correct'; pi.readOnly = true;
        $('pastHint').classList.remove('visible'); 
      } else {
        flash(pi, 'must-type');
      }

      if (ppOk) {
        ppi.className = 'correct'; ppi.readOnly = true;
        $('ppHint').classList.remove('visible'); 
      } else {
        flash(ppi, 'must-type');
      }

      fb.className = 'feedback-row retry';
      fb.textContent = '⟳ Please correct the remaining field(s) to continue.';
    }
    return;
  }

  const pOk  = normalize(pi.value)  === normalize(v.past);
  const ppOk = normalize(ppi.value) === normalize(v.pp);

  if (pOk && ppOk) {
    pi.className = 'correct'; ppi.className = 'correct';
    fb.className = 'feedback-row correct';
    fb.textContent = '✓ Correct.';
    $('checkBtn').disabled = true;
    setTimeout(() => onCorrect(), 500);
  } else {
    onWrong();

    fb.className = 'feedback-row wrong';
    fb.textContent = getTip(v);
    $('checkBtn').textContent = 'Confirm';
    S.revealMode = true;

    if (!pOk) {
      pi.className = 'wrong';
      $('pastHint').textContent = v.past;
      $('pastHint').classList.add('visible');
      pi.value = '';
    } else {
      pi.className = 'correct'; pi.readOnly = true;
    }

    if (!ppOk) {
      ppi.className = 'wrong';
      $('ppHint').textContent = v.pp;
      $('ppHint').classList.add('visible');
      ppi.value = '';
    } else {
      ppi.className = 'correct'; ppi.readOnly = true;
    }

    $('checkBtn').disabled = true;
    
    // Solo habilitar el botón si los campos no quedaron vacíos tras la animación 
    // pero si estaban mal, la lógica de validación dice que están vacíos, 
    // así que lo dejamos deshabilitado hasta que el usuario teclee
    setTimeout(() => { 
      if (!pOk) pi.className = 'must-type'; 
      if (!ppOk) ppi.className = 'must-type'; 
      validateEmptyInputs(); // Verifica si habilitar o no
      if (!pOk) pi.focus(); else ppi.focus(); 
    }, 380);
  }
}

function flash(el, cls) {
  el.className = 'wrong';
  el.value = ''; 
  $('checkBtn').disabled = true;
  setTimeout(() => { 
    el.className = cls; 
    $('checkBtn').disabled = false;
    el.focus();
  }, 380);
}

/* ── UI Helpers ── */
function $(id) { return document.getElementById(id); }

function showPrev() {
  const card = $('prevCard');
  if (!S.prevEntry) { card.classList.remove('visible'); return; }
  const { verb, firstTry } = S.prevEntry;
  $('prevVerbs').innerHTML = `
    <div class="prev-item"><span class="prev-item-label">Inf</span><span class="prev-item-val">${verb.inf}</span></div>
    <div class="prev-item"><span class="prev-item-label">Past</span><span class="prev-item-val">${verb.past}</span></div>
    <div class="prev-item"><span class="prev-item-label">Participle</span><span class="prev-item-val">${verb.pp}</span></div>
  `;
  const b = $('prevBadge');
  b.className = firstTry ? 'prev-badge ok' : 'prev-badge fail';
  b.textContent = firstTry ? '✓ first try' : 'corrected';
  card.classList.remove('visible');
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
}

function renderQueue() {
  const chips = $('queueChips');
  const preview = S.queue.slice(1, 9);
  if (!preview.length) { $('queuePreview').style.display='none'; return; }
  $('queuePreview').style.display = 'block';
  chips.innerHTML = preview.map(v => {
    const lv = S.meta[v.inf].level;
    const cls = lv===1?'chip l1':lv===2?'chip l2':lv===3?'chip l3':'chip';
    return `<span class="${cls}">${v.inf}</span>`;
  }).join('');
}

function updateStats() {
  const pct = Math.round((S.mastered.size / VERBS.length) * 100);
  $('progressBar').style.width = pct + '%';
  $('statDone').textContent    = S.mastered.size;
  $('statQueue').textContent   = S.queue.length;
  $('statReview').textContent  = S.reviewing.size;
  $('statMaxStreak').textContent = S.maxStreak; // Actualiza el récord máximo
}

function showCompleted() {
  $('practiceCard').style.display = 'none';
  $('completedCard').style.display = 'block';
  $('completedScore').textContent = S.maxStreak;
}

/* ── Events ── */
$('checkBtn').addEventListener('click', check);

function onKey(e) {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  
  if (e.key === ' ') e.preventDefault();

  const pi = $('pastInput'), ppi = $('ppInput');
  
  // Siempre permitimos saltar de past a pp, independientemente de si el botón está desactivado
  if (e.target === pi && !ppi.readOnly) {
    ppi.focus(); 
    return;
  }

  if ($('checkBtn').disabled) return; 
  
  check();
}

$('pastInput').addEventListener('keydown', onKey);
$('ppInput').addEventListener('keydown', onKey);

$('restartBtn').addEventListener('click', () => {
  if (!confirm('Are you sure you want to reset all your progress for this session?')) return;
  
  VERBS.forEach(v => {
    S.meta[v.inf] = { level: 0, streak: 0, totalErrors: 0 };
  });
  saveState();

  S.currentStreak = 0;
  S.maxStreak = 0;
  S.prevEntry = null;

  buildQueue();

  $('prevCard').classList.remove('visible');
  $('practiceCard').style.display = 'block';
  $('completedCard').style.display = 'none';
  updateStats();
  animateStreak('none');
  if(S.queue.length > 0) loadVerb(S.queue[0]);
});

// Botón de reinicio global con confirmación
$('globalResetBtn').addEventListener('click', () => {
  if (!confirm('Are you sure you want to completely erase all your saved data and start over?')) return;
  
  localStorage.removeItem('irregularVerbsMeta');
  initState();
  updateStats();
  animateStreak('none');
  $('prevCard').classList.remove('visible');
  if(S.queue.length > 0) loadVerb(S.queue[0]);
});

/* ── Init ── */
initState();
updateStats();
if (S.queue.length > 0) {
  loadVerb(S.queue[0]);
} else {
  showCompleted();
}
</script>
